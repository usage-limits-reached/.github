<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 240" role="img" aria-label="usage limit reached — pondering">
  <!-- LOCKED palette: paper #F1E9D9, ink #221D17, clay #C15F3C, taupe #9C8F79. flat only. -->
  <rect width="880" height="240" fill="#F1E9D9"/>

  <style>
    .mono { font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace; }
  </style>

  <!-- header: box logo (429 = too many requests) -->
  <text x="60" y="58" class="mono" font-size="18" font-weight="500" fill="#9C8F79" letter-spacing="3">usage limit reached</text>
  <rect x="290" y="42" width="13" height="20" fill="#C15F3C">
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.05s" repeatCount="indefinite" calcMode="discrete"/>
  </rect>

  <!-- prompt -->
  <text x="60" y="132" class="mono" font-size="26" font-weight="500" fill="#9C8F79">$ ulr --status</text>

  <!-- cycling status word, right-aligned so the cursor stays glued to the end -->
  <g class="mono" font-size="30" font-weight="500" fill="#221D17" text-anchor="end">
    <text x="724" y="190" opacity="0">pondering…<animate attributeName="opacity" values="1;0;0;0;0" keyTimes="0;0.2;0.4;0.6;0.8" dur="11s" calcMode="discrete" repeatCount="indefinite"/></text>
    <text x="724" y="190" opacity="0">working…<animate attributeName="opacity" values="0;1;0;0;0" keyTimes="0;0.2;0.4;0.6;0.8" dur="11s" calcMode="discrete" repeatCount="indefinite"/></text>
    <text x="724" y="190" opacity="0">brewing…<animate attributeName="opacity" values="0;0;1;0;0" keyTimes="0;0.2;0.4;0.6;0.8" dur="11s" calcMode="discrete" repeatCount="indefinite"/></text>
    <text x="724" y="190" opacity="0">reticulating splines…<animate attributeName="opacity" values="0;0;0;1;0" keyTimes="0;0.2;0.4;0.6;0.8" dur="11s" calcMode="discrete" repeatCount="indefinite"/></text>
    <text x="724" y="190" opacity="0">you've reached your usage limit<animate attributeName="opacity" values="0;0;0;0;1" keyTimes="0;0.2;0.4;0.6;0.8" dur="11s" calcMode="discrete" repeatCount="indefinite"/></text>
  </g>
  <!-- the cursor IS the mark -->
  <rect x="732" y="167" width="16" height="26" fill="#C15F3C">
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.05s" repeatCount="indefinite" calcMode="discrete"/>
  </rect>

  <!-- footer -->
  <text x="60" y="222" class="mono" font-size="16" font-weight="400" fill="#9C8F79" letter-spacing="2">usagelimitreached.com</text>
</svg>
